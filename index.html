<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport: locked to device width, no user-zoom, cover the safe-area (notches) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Theme + manifest -->
    <meta name="theme-color" content="#06122a" />
    <meta name="color-scheme" content="dark" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/locket_app_icon.png" />

    <!-- iOS: Add-to-Homescreen → Fullscreen native-feel -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Locket" />
    <link rel="apple-touch-icon" href="/locket_app_icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/locket_app_icon.png" />

    <!-- Disable phone-number / email auto-detection (makes links feel native) -->
    <meta name="format-detection" content="telephone=no, email=no, address=no" />

    <!-- Microsoft Tile -->
    <meta name="msapplication-TileColor" content="#06122a" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Splash fallback background (prevents white flash on launch) -->
    <style>
      html, body {
        background: #06122a;
        overscroll-behavior: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      /* Hide address-bar aggressively on initial scroll (Chrome Android) */
      @media (display-mode: standalone), (display-mode: fullscreen) {
        html, body { height: 100vh; height: 100dvh; overflow: hidden; }
      }
    </style>

    <title>Locket Widget</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Address-bar hide trick for mobile Safari when opened from browser
      // (PWA / standalone mode already hides it — this is a fallback for first launch)
      if ('standalone' in window.navigator && !window.navigator.standalone) {
        window.addEventListener('load', () => {
          setTimeout(() => window.scrollTo(0, 1), 0);
        });
      }
    </script>
  </body>
</html>
